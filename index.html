
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Francesco Guerini | Digital Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        
        .bento-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }
        .bento-card:hover { transform: scale(1.02); }
        
        .gradient-text {
            background: linear-gradient(90deg, #3b82f6, #2dd4bf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bg-mesh {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(45, 212, 191, 0.1) 0px, transparent 50%);
        }
    </style>
</head>
<body class="bg-mesh text-slate-900 min-h-screen">

    <nav class="max-w-5xl mx-auto px-6 py-8 flex justify-between items-center">
        <div class="text-2xl font-extrabold tracking-tighter">
            FG<span class="text-blue-600">.</span>
        </div>
        <div class="flex gap-4">
            <a href="ospedale.html" class="p-3 bg-white rounded-2xl shadow-sm hover:shadow-md transition-all text-slate-600 hover:text-blue-600" title="Ospedale">
                <i class="fa-solid fa-hospital"></i>
            </a>
            <a href="cre.html" class="p-3 bg-white rounded-2xl shadow-sm hover:shadow-md transition-all text-slate-600 hover:text-orange-600" title="CRE">
                <i class="fa-solid fa-sun"></i>
            </a>
            <a href="des.html" class="p-3 bg-white rounded-2xl shadow-sm hover:shadow-md transition-all text-slate-600 hover:text-emerald-600" title="DESS">
                <i class="fa-solid fa-leaf"></i>
            </a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-4 md:grid-rows-3 gap-6">
            
            <div class="md:col-span-3 md:row-span-2 bento-card border border-white rounded-[3rem] p-10 md:p-16 flex flex-col justify-center relative overflow-hidden shadow-2xl shadow-blue-900/5">
                <div class="absolute -top-24 -right-24 w-64 h-64 bg-blue-100 rounded-full blur-3xl opacity-50"></div>
                
                <h2 class="text-blue-600 font-bold uppercase tracking-[0.3em] text-xs mb-4">PCTO 2024/25</h2>
                <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6">
                    Francesco <span class="gradient-text">Guerini</span>
                </h1>
                <p class="text-slate-500 text-lg md:text-xl max-w-lg leading-relaxed font-light">
                    Studente del Liceo Amaldi. 
                </p>
            </div>

            <div class="md:col-span-1 bento-card bg-blue-600 rounded-[2.5rem] p-8 text-white flex flex-col justify-center items-center shadow-xl shadow-blue-600/20">
                <span class="text-5xl font-black">158</span>
                <span class="text-xs uppercase tracking-widest opacity-80 font-bold mt-2">Ore Totali</span>
            </div>

            <div class="md:col-span-1 bento-card bg-white border border-slate-100 rounded-[2.5rem] p-8 flex flex-col justify-center items-center shadow-lg shadow-slate-200/50">
                <span class="text-4xl font-black text-slate-800">3</span>
                <span class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mt-2 text-center">Esperienze Chiave</span>
            </div>

            <div class="md:col-span-2 bento-card bg-white border border-blue-100 rounded-[3rem] p-8 shadow-xl shadow-blue-900/5 group relative">
                <div class="flex justify-between items-start mb-6">
                    <div class="p-4 bg-blue-50 text-blue-600 rounded-2xl group-hover:bg-blue-600 group-hover:text-white transition-all">
                        <i class="fa-solid fa-hospital-user text-2xl"></i>
                    </div>
                    <a href="ospedale.html" class="text-slate-300 hover:text-blue-600 transition-colors">
                        <i class="fa-solid fa-arrow-up-right-from-square text-xl"></i>
                    </a>
                </div>
                <h3 class="text-2xl font-extrabold mb-2">Ospedale Bolognini</h3>
                <p class="text-slate-500 text-sm leading-relaxed mb-4">Orientamento sanitario e analisi dei sistemi di gestione clinica.</p>
                <a href="ospedale.html" class="absolute inset-0 z-10" aria-label="Vai al progetto ospedale"></a>
            </div>

            <div class="md:col-span-1 bento-card bg-white border border-orange-100 rounded-[3rem] p-8 shadow-xl shadow-orange-900/5 group relative">
                <div class="p-4 bg-orange-50 text-orange-600 rounded-2xl mb-6 inline-block">
                    <i class="fa-solid fa-sun text-2xl"></i>
                </div>
                <h3 class="text-xl font-extrabold mb-2">CRE 2025</h3>
                <p class="text-orange-600 font-bold text-sm flex items-center gap-2">
                    Vedi <i class="fa-solid fa-arrow-right transition-transform group-hover:translate-x-1"></i>
                </p>
                <a href="cre.html" class="absolute inset-0 z-10" aria-label="Vai al progetto CRE"></a>
            </div>

            <div class="md:col-span-1 bento-card bg-white border border-emerald-100 rounded-[3rem] p-8 shadow-xl shadow-emerald-900/5 group relative">
                <div class="p-4 bg-emerald-50 text-emerald-600 rounded-2xl mb-6 inline-block">
                    <i class="fa-solid fa-leaf text-2xl"></i>
                </div>
                <h3 class="text-xl font-extrabold mb-2">DESS</h3>
                <p class="text-emerald-600 font-bold text-sm flex items-center gap-2">
                    Info <i class="fa-solid fa-arrow-right transition-transform group-hover:translate-x-1"></i>
                </p>
                <a href="des.html" class="absolute inset-0 z-10" aria-label="Vai al progetto DESS"></a>
            </div>

        </div>
    </main>

    <footer class="max-w-5xl mx-auto px-6 py-10 flex flex-col md:flex-row justify-between items-center border-t border-slate-200 gap-4">
        <p class="text-slate-400 text-sm">© 2024 Francesco Guerini • Liceo Amaldi</p>
        <div class="flex gap-6 text-slate-300 text-lg">
            <i class="fa-brands fa-github hover:text-slate-900 transition-colors cursor-pointer"></i>
            <i class="fa-brands fa-linkedin hover:text-slate-900 transition-colors cursor-pointer"></i>
        </div>
    </footer>

</body>
</html>
